name: One-Time Telegram Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  send-test-message:
    if: contains(github.event.head_commit.message, 'Send one-time telegram no-results test')
    runs-on: ubuntu-latest

    steps:
      - name: Send one-time Telegram test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error

          message = (
              "Тестовое сообщение: проверка выполнена, новых подходящих билетов "
              "сейчас не найдено. Это разовая проверка; дальше бот будет писать "
              "только когда найдёт новые варианты."
          )

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          if not token:
              raise RuntimeError("TELEGRAM_BOT_TOKEN is empty or missing")
          if not chat_id:
              raise RuntimeError("TELEGRAM_CHAT_ID is empty or missing")

          payload = json.dumps(
              {
                  "chat_id": chat_id,
                  "text": message,
                  "disable_web_page_preview": False,
              }
          ).encode("utf-8")

          request = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(request, timeout=30) as response:
                  body = response.read().decode("utf-8", errors="replace")
                  print(body)
                  status_code = response.getcode()
                  if status_code < 200 or status_code >= 300:
                      raise RuntimeError(
                          f"Telegram request failed with status {status_code}: {body}"
                      )
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(body, file=sys.stderr)
              raise RuntimeError(f"Telegram HTTP error {exc.code}: {body}") from exc
          PY
