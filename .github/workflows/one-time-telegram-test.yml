name: One-Time Telegram Test

on:
  push:
    branches:
      - main

jobs:
  send-test-message:
    if: contains(github.event.head_commit.message, 'Send one-time telegram no-results test')
    runs-on: ubuntu-latest

    steps:
      - name: Send one-time Telegram test message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          message = (
              "Тестовое сообщение: проверка выполнена, новых подходящих билетов "
              "сейчас не найдено. Это разовая проверка; дальше бот будет писать "
              "только когда найдёт новые варианты."
          )

          payload = json.dumps(
              {
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": message,
                  "disable_web_page_preview": False,
              }
          ).encode("utf-8")

          request = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          with urllib.request.urlopen(request, timeout=30) as response:
              status_code = response.getcode()
              if status_code < 200 or status_code >= 300:
                  raise RuntimeError(f"Telegram request failed with status {status_code}")
          PY
