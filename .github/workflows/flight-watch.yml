name: Flight Watch

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Restore state cache
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: .state
          key: flight-watch-state-${{ github.run_id }}
          restore-keys: |
            flight-watch-state-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run flight monitor
        id: run-monitor
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FLIGHT_STATE_PATH: .state/flight_state.json
        run: |
          mkdir -p .logs
          python -u flight_monitor.py 2>&1 | tee .logs/flight-monitor.log

      - name: Show monitor log tail
        if: always()
        run: |
          echo "Last 120 log lines:"
          tail -n 120 .logs/flight-monitor.log || true

      - name: Write job summary
        if: always()
        run: |
          echo "## Flight Watch diagnostic summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Run step outcome: ${{ steps.run-monitor.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run step conclusion: ${{ steps.run-monitor.conclusion }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Log tail" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          tail -n 120 .logs/flight-monitor.log >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail workflow if monitor failed
        if: steps.run-monitor.outcome != 'success'
        run: exit 1

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .state
          key: flight-watch-state-${{ github.run_id }}
